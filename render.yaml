services:
  - type: web
    name: bauchi-institute-portal
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bauchi-db
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        value: gen-lang-client-0471330857
      # Optional: Add these if you have email configured
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

databases:
  - name: bauchi-db
    databaseName: bauchi_institute
    user: bauchi_user
    plan: free
    ipAllowList: []
